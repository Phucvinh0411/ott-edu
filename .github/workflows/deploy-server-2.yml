script: |
            cd ~/smile-edu-chat
            
            # 1. Tạo file docker-compose.yml
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              chat-service:
                image: ${{ secrets.DOCKER_USERNAME }}/smile-edu-chat:latest
                container_name: chat-service
                restart: always
                expose:
                  - "3000"
                environment:
                  - MONGODB_URI=${{ secrets.MONGODB_URI }}
            
              nginx:
                image: nginx:alpine
                container_name: chat-nginx
                restart: always
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx.conf:/etc/nginx/nginx.conf
                  - /etc/letsencrypt:/etc/letsencrypt:ro
                depends_on:
                  - chat-service
            EOF
            
            # 2. Tạo file nginx.conf
            cat << 'EOF' > nginx.conf
            events { worker_connections 1024; }
            http {
                server {
                    listen 80;
                    server_name chat.hnpvinh.io.vn;
                    return 301 https://$host$request_uri;
                }
                server {
                    listen 443 ssl;
                    server_name chat.hnpvinh.io.vn;
                    
                    ssl_certificate /etc/letsencrypt/live/chat.hnpvinh.io.vn/fullchain.pem;
                    ssl_certificate_key /etc/letsencrypt/live/chat.hnpvinh.io.vn/privkey.pem;

                    location / {
                        proxy_pass http://chat-service:3000;
                        proxy_http_version 1.1;
                        proxy_set_header Upgrade $http_upgrade;
                        proxy_set_header Connection "upgrade";
                        proxy_set_header Host $host;
                        proxy_set_header X-Real-IP $remote_addr;
                        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                        proxy_set_header X-Forwarded-Proto $scheme;
                    }
                }
            }
            EOF
            
            # 3. Triển khai
            docker compose pull
            docker compose up -d --force-recreate