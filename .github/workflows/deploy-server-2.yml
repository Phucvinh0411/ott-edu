name: Deploy Chat Service to AWS Server 2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Chat Image
        uses: docker/build-push-action@v4
        with:
          context: ./services/chat-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smile-edu-chat:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH commands on Server 2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~
            mkdir -p smile-edu-chat && cd smile-edu-chat
            
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              chat-service:
                image: ${{ secrets.DOCKER_USERNAME }}/smile-edu-chat:latest
                ports:
                  - "3000:3000"
                network_mode: "host" 
                environment:
                  - MONGODB_URI=${{ secrets.MONGODB_URI }}
            EOF
            
            docker compose pull
            docker compose up -d