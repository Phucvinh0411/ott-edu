name: Deploy Chat Service to AWS Server 2

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Chat Image
        uses: docker/build-push-action@v4
        with:
          context: ./services/chat-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smile-edu-chat:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Execute SSH commands on Server 2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_2_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/smile-edu-chat
            cd ~/smile-edu-chat
            
            # Tạo file docker-compose.yml tối giản cho Server 2 (không cần Nginx)
            cat << 'EOF' > docker-compose.yml
            version: '3.8'
            services:
              chat-service:
                image: ${{ secrets.DOCKER_USERNAME }}/smile-edu-chat:latest
                container_name: chat-service
                restart: always
                network_mode: "host"
                environment:
                  - MONGO_CHAT_URI=${MONGO_CHAT_URI:-${MONGO_URI:-${MONGODB_URI:-${{ secrets.MONGODB_URI || secrets.MONGO_URI }}}}}
                  - CORE_API_URL=${CORE_API_URL:-http://${{ secrets.SERVER_1_IP }}:8080}
                  - WEB_APP_URL=${WEB_APP_URL:-https://ott-edu.vercel.app}
                  - APP_CORS_ALLOWED_ORIGINS=${APP_CORS_ALLOWED_ORIGINS:-https://ott-edu.vercel.app,http://localhost:3000}
                  - AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
                  - AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
                  - AWS_REGION=${{ secrets.AWS_REGION }}
                  - AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}
                  - MEDIASOUP_LISTEN_IP=0.0.0.0
                  - MEDIASOUP_ANNOUNCED_IP=${{ secrets.SERVER_2_IP }}
                  - MEDIASOUP_RTC_MIN_PORT=40000
                  - MEDIASOUP_RTC_MAX_PORT=40020
            EOF
            
            # Hạ container Nginx cũ (nếu có) để giải phóng cổng 80/443
            docker compose down --remove-orphans
            
            # Khởi chạy lại chat-service
            docker compose pull
            docker compose up -d --force-recreate