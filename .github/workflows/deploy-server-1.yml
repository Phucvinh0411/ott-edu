name: Deploy API Microservices to AWS Server 1

on:
  push:
    branches: [ main ]
    # Chỉ chạy pipeline nếu có sự thay đổi file trong các thư mục này
    paths:
      - 'services/core-service/**'
      - 'services/assignment-service/**'
      - 'services/ai-service/**'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17 # Hoặc phiên bản Java bạn dùng (11, 21)
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # Hoặc gradle nếu bạn dùng Gradle

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # ---------------------------------------------
      # Tự động kiểm tra thay đổi và Build từng Service
      # ---------------------------------------------
      
      - name: Build & Push Core Service
        uses: docker/build-push-action@v4
        with:
          context: ./services/core-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smile-edu-core:latest

      - name: Build & Push Assignment Service
        uses: docker/build-push-action@v4
        with:
          context: ./services/assignment-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smile-edu-assignment:latest

      - name: Build & Push AI Service
        uses: docker/build-push-action@v4
        with:
          context: ./services/ai-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smile-edu-ai:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Redeploy on Server 1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/smile-edu && cd ~/smile-edu
            # (Đoạn script này sẽ tải file docker-compose.yml về hoặc cập nhật tại đây)
            docker compose pull
            docker compose up -d --remove-orphans