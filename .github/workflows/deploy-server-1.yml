name: Deploy API Microservices to AWS Server 1

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Core Service
        uses: docker/build-push-action@v4
        with:
          context: ./services/core-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smile-edu-core:latest

      - name: Build & Push Assignment Service
        uses: docker/build-push-action@v4
        with:
          context: ./services/assignment-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smile-edu-assignment:latest

      - name: Build & Push AI Service
        uses: docker/build-push-action@v4
        with:
          context: ./services/ai-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/smile-edu-ai:latest

  deploy-to-ec2:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Copy Gateway config to Server 1
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "gateway/nginx.conf"
          target: "/home/ubuntu/smile-edu"

      - name: SSH and Redeploy on Server 1
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_1_IP }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p ~/smile-edu && cd ~/smile-edu
            
            # Copy certificates resolving symbolic links
            sudo rm -rf /home/ubuntu/smile-edu/certs
            mkdir -p /home/ubuntu/smile-edu/certs
            sudo cp -L /etc/letsencrypt/live/api.hnpvinh.io.vn/fullchain.pem /home/ubuntu/smile-edu/certs/dev.crt
            sudo cp -L /etc/letsencrypt/live/api.hnpvinh.io.vn/privkey.pem /home/ubuntu/smile-edu/certs/dev.key
            sudo chmod 644 /home/ubuntu/smile-edu/certs/dev.crt /home/ubuntu/smile-edu/certs/dev.key
            
            # Tự động tạo file docker-compose.yml trên EC2 Server 1
            cat << 'EOF' > docker-compose.yml
            version: '3.8'

            services:
              mysql-db:
                image: mysql:8.0
                container_name: mysql-db
                ports:
                  - "3306:3306"
                environment:
                  MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
                  MYSQL_DATABASE: ${MYSQL_DATABASE}
                volumes:
                  - /home/ubuntu/smile-edu-data:/var/lib/mysql

              core-service:
                image: ${{ secrets.DOCKER_USERNAME }}/smile-edu-core:latest
                container_name: core-service
                ports:
                  - "8080:8080"
                depends_on:
                  - mysql-db
                environment:
                  - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE}
                  - CHAT_SERVICE_URL=http://${{ secrets.SERVER_2_IP }}:3000
                  - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}
                  - MONGO_URI=${MONGO_URI}

              assignment-service:
                image: ${{ secrets.DOCKER_USERNAME }}/smile-edu-assignment:latest
                container_name: assignment-service
                ports:
                  - "8081:8081"
                depends_on:
                  - mysql-db
                environment:
                  - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/${MYSQL_DATABASE}
                  - MYSQL_PASSWORD=${MYSQL_ROOT_PASSWORD}

              ai-service:
                image: ${{ secrets.DOCKER_USERNAME }}/smile-edu-ai:latest
                container_name: ai-service
                ports:
                  - "8082:8082"
                depends_on:
                  - mysql-db
                environment:
                  - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}

              gateway:
                image: nginx:alpine
                container_name: gateway
                restart: always
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - /home/ubuntu/smile-edu/gateway/nginx.conf:/etc/nginx/nginx.conf
                  - /home/ubuntu/smile-edu/certs/dev.crt:/etc/nginx/certs/dev.crt:ro
                  - /home/ubuntu/smile-edu/certs/dev.key:/etc/nginx/certs/dev.key:ro
                depends_on:
                  - core-service
                  - assignment-service
                  - ai-service
            EOF

            docker compose pull
            docker compose up -d --remove-orphans