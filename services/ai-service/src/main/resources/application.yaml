spring:
  application:
    name: ai-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://ai-postgres-db:5432/ai_service_db}
    username: ${SPRING_DATASOURCE_USERNAME:ai_service}
    password: ${SPRING_DATASOURCE_PASSWORD:ai_service}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          lob:
            non_contextual_creation: true
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  task:
    execution:
      pool:
        core-size: 4
        max-size: 8
        queue-capacity: 50
      thread-name-prefix: ai-async-

app:
  ai:
    openrouter:
      base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
      api-key: ${OPENROUTER_API_KEY}
      model: ${OPENROUTER_CHAT_MODEL:openai/gpt-4o-mini}
      site-url: ${OPENROUTER_SITE_URL:}
      app-name: ${OPENROUTER_APP_NAME:ott-edu}
    chunking:
      min-chunk-size: 300
      max-chunk-size: 500

server:
  port: 8080
  servlet:
    async:
      timeout: 300000
